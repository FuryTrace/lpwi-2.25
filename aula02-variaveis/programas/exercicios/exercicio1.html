<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" contpt-BRt="width=device-width, initial-scale=1.0">
    <title>Vizinho de um Número</title>
</head>
<body>
    
    <h1>Vizinho de um Número</h1>

    <script>
        
        const numero = Number(prompt("Digite um número inteiro: "));
        const anterior = numero - 1;
        const posterior = numero + 1;
        alert(`Número digitado: ${numero}\nAnterior: ${anterior}\nPosterior: ${posterior}`);

    </script>

</body>
</html>
